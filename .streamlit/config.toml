# Streamlit Configuration for TELOS Observatory
# This file configures theme, server, and browser settings

[theme]
primaryColor = "#FFD700"  # Gold - TELOS brand color
backgroundColor = "#0E1117"  # Dark background
secondaryBackgroundColor = "#1a1a1a"  # Slightly lighter dark
textColor = "#e0e0e0"  # Light gray text
font = "sans serif"

[server]
# Server settings
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200  # MB
headless = true

# Session settings
enableWebsocketCompression = true

# UI settings - hide Streamlit branding
[client]
showErrorDetails = false
toolbarMode = "minimal"

[ui]
hideTopBar = true
# hideSidebarNav removed - deprecated in newer Streamlit versions

[browser]
# Browser settings
gatherUsageStats = false  # Disable analytics for privacy
serverAddress = "localhost"
serverPort = 8501

[runner]
# Runner settings
magicEnabled = true
fastReruns = true
