<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELOS Governance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 500px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2d2d2d;
        }

        h1 {
            font-size: 24px;
            color: #F4D03F;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: #888;
        }

        .status-section {
            background: #2d2d2d;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-label {
            font-size: 14px;
            color: #aaa;
        }

        .status-value {
            font-size: 14px;
            font-weight: 600;
        }

        .status-value.connected {
            color: #4CAF50;
        }

        .status-value.disconnected {
            color: #FF5757;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .indicator.active {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }

        .indicator.inactive {
            background: #FF5757;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #F4D03F;
            color: #0d0d0d;
            font-weight: 700;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 208, 63, 0.3);
            background: #f5d75f;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .session-info {
            background: rgba(244, 208, 63, 0.1);
            border-left: 3px solid #F4D03F;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 10px;
        }

        .session-info div {
            margin-bottom: 5px;
        }

        .test-input {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .test-output {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .tier-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .tier-1 {
            background: #4CAF50;
            color: #000;
        }

        .tier-2 {
            background: #F4D03F;
            color: #000;
        }

        .tier-3 {
            background: #FF5757;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>TELOS</h1>
        <div class="subtitle">Governance Extension v1.0</div>
    </div>

    <div class="status-section">
        <h3 style="margin-bottom: 10px; font-size: 16px;">Status</h3>
        <div class="status-row">
            <span class="status-label">Ollama</span>
            <span class="status-value" id="ollamaStatus">
                <span class="indicator inactive" id="ollamaIndicator"></span>
                Checking...
            </span>
        </div>
        <div class="status-row">
            <span class="status-label">Session</span>
            <span class="status-value" id="sessionStatus">
                <span class="indicator inactive" id="sessionIndicator"></span>
                No session
            </span>
        </div>
        <div class="status-row">
            <span class="status-label">Turns Processed</span>
            <span class="status-value" id="turnsProcessed">0</span>
        </div>
    </div>

    <div class="status-section">
        <h3 style="margin-bottom: 10px; font-size: 16px;">Actions</h3>
        <button class="btn btn-primary" id="initButton">Initialize Session</button>
        <button class="btn btn-secondary" id="testButton">Test Ollama</button>
    </div>

    <div class="status-section" id="testSection" style="display: none;">
        <h3 style="margin-bottom: 10px; font-size: 16px;">Test Governance</h3>
        <input type="text" class="test-input" id="testMessage" placeholder="Enter test message...">
        <button class="btn btn-primary" id="sendTest">Send & Govern</button>
        <div class="test-output" id="testOutput"></div>
    </div>

    <div class="session-info" id="sessionInfo" style="display: none;">
        <div><strong>Session ID:</strong> <span id="sessionId">-</span></div>
        <div><strong>Created:</strong> <span id="sessionCreated">-</span></div>
        <div><strong>Telemetric Signatures:</strong> <span style="color: #4CAF50;">Enabled</span></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
