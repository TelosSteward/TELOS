# ── Tool Definitions ──
# Mapped from OpenClaw's 10 tool groups. Risk levels follow the
# Russell governance theory tier mapping (M0 convergence point C3).

tools:
  # group:fs — File System (HIGH risk)
  - name: fs_read_file
    description: "Read the contents of a file within the project workspace, such as reading README.md, source code files, configuration YAML, or project documentation"
    risk_level: low
  - name: fs_write_file
    description: "Write content to a new or existing file in the project workspace, such as creating Python modules, writing test fixtures, or saving generated configuration"
    risk_level: medium
  - name: fs_edit_file
    description: "Edit an existing file by applying targeted modifications, such as updating import statements, fixing bugs in source code, or changing configuration values"
    risk_level: medium
  - name: fs_delete_file
    description: "Delete a file from the project workspace, such as removing temporary files, cleaning build artifacts, or deleting outdated test fixtures"
    risk_level: high
  - name: fs_list_directory
    description: "List files and directories within the project workspace, such as viewing the src/ directory structure, checking what files exist, or exploring project layout"
    risk_level: low
  - name: fs_search_files
    description: "Search file contents for patterns using regex or text matching, such as finding all TODO comments, locating function definitions, or searching for import references"
    risk_level: low
  - name: fs_apply_patch
    description: "Apply a unified diff patch to one or more files in the workspace, such as applying code review suggestions, merging upstream changes, or applying formatting fixes"
    risk_level: medium
  - name: fs_move_file
    description: "Move or rename a file within the project workspace, such as reorganizing modules into subdirectories, renaming for clarity, or moving tests to the correct folder"
    risk_level: medium

  # group:runtime — Shell Execution (CRITICAL risk)
  - name: runtime_execute
    description: "Execute a shell command in the agent's sandboxed environment, such as running pytest to check for regressions, checking git status or git diff, installing pip packages in development mode, or running linters and formatters on changed files"
    risk_level: critical
  - name: runtime_process
    description: "Start, stop, or manage background processes within the agent sandbox, such as running a development server in the background, stopping a hung test runner, or managing a file watcher process"
    risk_level: critical

  # group:web — Web/Network (HIGH risk)
  - name: web_navigate
    description: "Navigate a browser to a URL and retrieve the page content, such as opening Python asyncio documentation, viewing a GitHub pull request, or loading an API reference page"
    risk_level: medium
  - name: web_fetch
    description: "Make an HTTP request to retrieve data from a URL, such as fetching a JSON API response, downloading a requirements.txt from a repository, or checking if an endpoint is reachable"
    risk_level: medium
  - name: web_scrape
    description: "Extract structured data from a web page using selectors, such as pulling release notes from a changelog page, extracting version numbers from a downloads page, or collecting documentation headings"
    risk_level: medium
  - name: web_search
    description: "Search the web using a search engine query, such as looking up error messages, finding library documentation, or researching best practices for a coding pattern"
    risk_level: low

  # group:messaging — External Communication (CRITICAL risk)
  - name: messaging_send
    description: "Send a message via WhatsApp, Telegram, Slack, Discord, or other configured messaging platform, such as posting build status to the engineering Slack channel, sending a PR summary to the team Discord, or notifying a channel about deployment completion"
    risk_level: high
  - name: messaging_read
    description: "Read messages from a configured messaging channel, such as checking the team Slack channel for recent updates, reading deployment notifications, or reviewing feedback in a Discord thread"
    risk_level: medium
  - name: messaging_reply
    description: "Reply to a specific message in a messaging channel, such as responding to a code review comment in Slack, acknowledging a deployment notification, or answering a team question in Discord"
    risk_level: high

  # group:automation — Scheduled Tasks (CRITICAL risk)
  - name: automation_cron_create
    description: "Create a new scheduled task (cron job) to execute actions at specified intervals, such as scheduling nightly test runs, setting up periodic backup scripts, or configuring hourly health checks"
    risk_level: critical
  - name: automation_cron_list
    description: "List all configured scheduled tasks, such as viewing active cron jobs, reviewing scheduled backup scripts, checking what automation is currently running, or auditing the automation history"
    risk_level: low
  - name: automation_cron_delete
    description: "Delete an existing scheduled task, such as removing an obsolete nightly build job, canceling a deprecated backup schedule, or cleaning up test automation entries"
    risk_level: medium
  - name: automation_gateway_config
    description: "Modify the OpenClaw gateway configuration including port, auth, and access settings, such as changing the gateway listening port, updating authentication tokens, or adjusting CORS and access control policies"
    risk_level: critical

  # group:sessions — Session Management (LOW risk)
  - name: sessions_save
    description: "Save the current agent session state for later resumption, such as persisting a debugging session before stepping away, saving progress on a multi-file refactor, or checkpointing before a risky operation"
    risk_level: low
  - name: sessions_restore
    description: "Restore a previously saved agent session state, such as resuming a debugging session from yesterday, picking up a refactoring task where you left off, or recovering context after a restart"
    risk_level: low
  - name: sessions_list
    description: "List available saved sessions, such as viewing all checkpointed sessions, finding a previous debugging session by name, or checking which sessions are available to resume"
    risk_level: low
  - name: sessions_delete
    description: "Delete a saved session, such as cleaning up old debugging checkpoints, removing completed task sessions, or freeing storage from obsolete session snapshots"
    risk_level: low

  # group:memory — Agent Memory (LOW risk)
  - name: memory_store
    description: "Store a key-value pair in the agent's persistent memory, such as saving a project convention for future reference, recording a user preference, or caching a frequently used configuration value"
    risk_level: low
  - name: memory_retrieve
    description: "Retrieve a value from the agent's persistent memory by key, such as looking up a previously stored project convention, fetching a cached configuration value, or recalling a user preference"
    risk_level: low
  - name: memory_search
    description: "Search the agent's persistent memory using semantic or keyword queries, such as finding all stored conventions related to testing, searching for remembered debugging notes, or locating cached API endpoints"
    risk_level: low

  # group:ui — User Interface (LOW risk)
  - name: ui_display
    description: "Display formatted output to the user including text, tables, and code blocks, such as showing test results as a formatted table, rendering a code diff with syntax highlighting, or presenting a summary report"
    risk_level: low
  - name: ui_prompt
    description: "Prompt the user for input or confirmation, such as asking which files to include in a commit, confirming before deleting test fixtures, or requesting clarification on an ambiguous instruction"
    risk_level: low

  # group:nodes — Agent Orchestration (MEDIUM risk)
  - name: nodes_delegate
    description: "Delegate a sub-task to another configured agent with specified scope and permissions, such as assigning test execution to a sub-agent scoped to the tests/ directory, delegating documentation generation, or handing off a code review to a specialized agent"
    risk_level: high
  - name: nodes_coordinate
    description: "Coordinate multiple agents working on related tasks with shared context, such as synchronizing frontend and backend agents during a feature build, coordinating test agents across multiple modules, or orchestrating a parallel refactoring effort"
    risk_level: medium

  # group:openclaw — Built-in Management (CRITICAL risk)
  - name: openclaw_skill_install
    description: "Install a new skill from ClawHub or external source into the OpenClaw environment, such as adding a code formatting skill, installing a database migration tool, or pulling a community-contributed testing framework"
    risk_level: critical
  - name: openclaw_skill_execute
    description: "Execute an installed skill with specified parameters, such as running a code analysis skill on the src/ directory, invoking a documentation generator with output format options, or executing a database seeding skill"
    risk_level: high
  - name: openclaw_config_modify
    description: "Modify agent configuration including sandbox mode, permissions, and tool access, such as adjusting file system access boundaries, changing the agent's allowed tool list, or updating sandbox isolation settings"
    risk_level: critical
  - name: openclaw_agent_create
    description: "Create a new agent instance with specified configuration and permissions, such as spawning a dedicated testing agent with read-only workspace access, creating a documentation agent scoped to docs/, or setting up a CI agent with limited shell execution"
    risk_level: high

constraints:
  max_chain_length: 20
  max_tool_calls_per_step: 5
  escalation_threshold: 0.50
  require_human_above_risk: high

# SetFit L1.5 boundary classifier — domain-specific model trained on
# 171 OpenClaw scenarios (AUC 0.990, detection 96.2%, FPR 1.3%).
# See: research/setfit_openclaw_mve_closure.md
setfit:
  enabled: true
  model_dir: models/setfit_openclaw_v1
  threshold: 0.50
  asymmetric_override: true
  composite_boost: true  # D13 Intervention 3: SetFit legitimacy modulation in composite scoring

# Permission controller — ESCALATE verdict notifications.
# When the governance engine returns ESCALATE, the permission controller
# notifies you and waits for an approve/deny decision. Approved overrides
# produce an Ed25519-signed receipt for EU AI Act Article 14 compliance.
#
# Channels:
#   Telegram — interactive (Approve/Deny inline buttons). Create a bot
#     via @BotFather, get the token, then message the bot and use
#     https://api.telegram.org/bot<TOKEN>/getUpdates to find your chat_id.
#   WhatsApp — interactive (Approve/Deny buttons via Cloud API). Set up a
#     Meta Business app at https://developers.facebook.com, configure a
#     WhatsApp phone number, and generate a permanent access token.
#     Requires a webhook endpoint for receiving button callbacks.
#   Discord — notification only (v1). Create a webhook in channel settings
#     → Integrations → Webhooks. No interactive response (use Telegram,
#     WhatsApp, or CLI to approve/deny).
#
# notifications:
#   telegram_bot_token: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
#   telegram_chat_id: "987654321"
#   discord_webhook_url: "https://discord.com/api/webhooks/1234567890/abcdef..."
#   whatsapp_phone_number_id: "1234567890"
#   whatsapp_access_token: "EAAx..."
#   whatsapp_recipient_number: "+1234567890"
#   escalation_timeout_seconds: 300   # 5 minutes; deny if no response
#   timeout_action: "deny"            # "deny" (fail-closed) or "allow" (fail-open)
