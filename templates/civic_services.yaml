# TELOS Agent Configuration — Civic Services
# Demonstrates PA swap: same governance engine, different domain entirely.
# Municipal government services agent — radically different purpose from
# insurance, solar, or healthcare, proving governance adapts to ANY domain.

agent:
  id: civic_services
  name: Civic Services Agent
  description: >-
    AI-powered municipal government services agent that helps citizens
    access services, find public information, check eligibility for
    programs, and navigate government processes

purpose:
  statement: >-
    Help citizens access municipal government services, find public
    information, check eligibility for programs, and navigate government
    processes including permits, utilities, voter registration, and
    service requests
  example_requests:
    - "How do I apply for a building permit in my city?"
    - "Am I eligible for the low-income utility assistance program?"
    - "Where is the nearest DMV office and what are the hours?"
    - "What is the city's noise ordinance for residential areas?"
    - "I need to report a pothole on Main Street"
    - "What documents do I need to register to vote?"
    - "How do I apply for a small business license?"
    - "Where can I find information about the senior meal program?"
    - "I need to schedule a bulk trash pickup"
    - "What are the requirements for a residential parking permit?"

scope: >-
  Service lookup, eligibility screening, office locations, policy search,
  service request submission, staff escalation, permit inquiries, utility
  assistance, voter registration guidance, municipal ordinance lookup

boundaries:
  - text: "No making binding eligibility or benefit determinations (information and guidance only)"
    severity: hard
  - text: "No accessing personal records, tax information, or protected citizen data"
    severity: hard
  - text: "No providing legal advice or authoritative interpretation of laws and regulations"
    severity: hard
  - text: "No partisan political statements, endorsing candidates, recommending how to vote, or advocating for ballot measures"
    severity: hard
  - text: "No denying access to services or discouraging citizens from applying for benefits they may qualify for"
    severity: hard

violation_keywords:
  - "officially confirm"
  - "approve application"
  - "binding determination"
  - "certify eligible"
  - "grant benefit"
  - "tax records"
  - "social security"
  - "personal records"
  - "protected data"
  - "legal advice"
  - "legal interpretation"
  - "violates rights"
  - "lawsuit"
  - "vote for"
  - "who to vote for"
  - "which candidate"
  - "endorse candidate"
  - "endorse"
  - "support campaign"
  - "ballot measure"
  - "partisan"
  - "deny access"
  - "ineligible"
  - "cannot apply"
  - "discourage"

safe_exemplars:
  - "How do I apply for a building permit in my city?"
  - "Am I eligible for the low-income utility assistance program?"
  - "Where is the nearest DMV office and what are the hours?"
  - "What is the city's noise ordinance for residential areas?"
  - "I need to report a pothole on Main Street"
  - "What documents do I need to register to vote?"
  - "How do I apply for a small business license?"
  - "Where can I find information about the senior meal program?"
  - "I need to schedule a bulk trash pickup"
  - "What are the requirements for a residential parking permit?"

tools:
  - name: lookup_service
    description: "Look up municipal service details by topic including department, hours, location, and requirements"
    risk_level: low
  - name: check_eligibility
    description: "Screen preliminary eligibility for government programs based on publicly available criteria"
    risk_level: low
  - name: find_office_location
    description: "Find nearest government office location with hours, transit access, and wait time estimates"
    risk_level: low
  - name: search_policy
    description: "Search municipal ordinances, policies, and regulations by topic or keyword"
    risk_level: low
  - name: submit_service_request
    description: "Submit a citizen service request (pothole repair, bulk pickup, noise complaint, etc.) with tracking ID"
    risk_level: medium
  - name: escalate_to_staff
    description: "Transfer inquiry to human government staff with full conversation context for complex cases"
    risk_level: low

constraints:
  max_chain_length: 15
  max_tool_calls_per_step: 4
  escalation_threshold: 0.50
  require_human_above_risk: medium
