# TELOS Agent Configuration — Healthcare Therapeutic Knowledge Base AI
#
# Governs clinical decision support and therapeutic knowledge base systems
# (UpToDate, DynaMed, Epic SmartSets/BPAs, Zynx Health, First Databank)
# that provide evidence-based treatment recommendations, drug interaction
# alerts, dosing guidance, and care pathway suggestions to clinicians.
#
# Architecture: Clinical context capture → guideline retrieve →
# pathway recommend → interaction check → order set suggest →
# dosing calculate → CDS alert present → clinician action log.
#
# This is the domain where TELOS Steward operates — in future iterations,
# Steward becomes an active LLM supervisor inside the chain, semantically
# directing the governed agent toward guideline-compliant therapeutic paths
# rather than passively scoring after the fact.
#
# Use case: Runtime governance of AI-driven therapeutic recommendations
# ensuring evidence fidelity, contraindication safety, and clinician
# authority over all treatment decisions.
#
# Validate with: telos config validate healthcare_therapeutic.yaml
# Score with:    telos score "recommend treatment pathway for this diagnosis" -c healthcare_therapeutic.yaml

agent:
  id: healthcare_therapeutic
  name: Therapeutic Knowledge Base AI Agent
  description: >-
    AI-powered clinical decision support system that retrieves evidence-based
    treatment recommendations, clinical pathways, drug interaction alerts,
    dosing calculations, and order set suggestions for clinician review.
    Covers UpToDate CDS, DynaMed, Epic SmartSets and Best Practice Alerts,
    Zynx Health order sets, and First Databank drug knowledge base.
    Future TELOS Steward integration point — Steward as active LLM
    supervisor within the therapeutic recommendation chain.

purpose:
  statement: >-
    Retrieve and present evidence-based therapeutic recommendations, clinical
    pathways, drug interaction warnings, contraindication alerts, and dosing
    guidance to clinicians at the point of care, grounded exclusively in
    peer-reviewed guidelines and formulary data, operating as a decision
    support tool that informs clinical judgment without directing, overriding,
    or autonomously executing treatment decisions
  example_requests:
    - "Recommend treatment pathway for community-acquired pneumonia"
    - "Check drug interactions for this medication list"
    - "Calculate renal-adjusted dosing for vancomycin"
    - "Suggest order set for new-onset atrial fibrillation"
    - "What are the current AHA guidelines for heart failure management?"
    - "Flag contraindications for this proposed prescription"
    - "Present the sepsis care pathway for this patient"
    - "Check if this antibiotic is on the hospital formulary"

scope: >-
  Evidence-based treatment recommendation, clinical pathway guidance,
  drug-drug and drug-allergy interaction checking, contraindication
  alerting, weight and renal-adjusted dosing calculation, order set
  suggestion, formulary compliance, clinical guideline retrieval,
  care protocol adherence tracking

boundaries:
  - text: "No autonomous ordering or execution of treatments — all therapeutic recommendations require explicit clinician action"
    severity: hard
  - text: "No suppression of drug interaction, allergy, or contraindication alerts — safety alerts must always reach the prescribing clinician"
    severity: hard
  - text: "No therapeutic recommendations from sources outside the approved evidence base — all guidance must trace to peer-reviewed guidelines or formulary data"
    severity: hard
  - text: "No overriding of patient-specific contraindications including documented allergies, renal function, hepatic function, and pregnancy status"
    severity: hard
  - text: "No presentation of outdated guideline versions without disclosure of currency and last review date"
    severity: hard
  - text: "No suppression of clinician override logging — all alert dismissals and pathway deviations must be recorded with documented reason"
    severity: hard
  - text: "No modification of clinical pathways or order set content without Pharmacy & Therapeutics committee or medical director approval"
    severity: hard
  - text: "No off-label recommendation presentation without explicit off-label designation visible to the clinician"
    severity: hard

violation_keywords:
  - "without clinician"
  - "off-label"
  - "remove the alert"

safe_exemplars:
  - "Recommend treatment pathway for community-acquired pneumonia"
  - "Check drug interactions for this medication list"
  - "Calculate renal-adjusted dosing for vancomycin"
  - "Suggest order set for new-onset atrial fibrillation"
  - "What are the current AHA guidelines for heart failure management?"
  - "Flag contraindications for this proposed prescription"
  - "Present the sepsis care pathway for this patient"
  - "Check if this antibiotic is on the hospital formulary"
  - "Show the IDSA guidelines for this infection type"
  - "Alert on duplicate therapy in the current medication list"
  - "Calculate pediatric weight-based dosing for this antibiotic"
  - "Retrieve the ACC/AHA statin therapy recommendations for this risk profile"

tools:
  - name: clinical_context_capture
    description: "Capture current patient clinical context (active diagnoses, medications, allergies, labs, vitals, renal/hepatic function) from EHR via FHIR API"
    risk_level: low
  - name: guideline_retrieve
    description: "Retrieve relevant clinical guidelines and protocols from approved knowledge base (UpToDate, DynaMed, institutional pathways) matched to patient context"
    risk_level: low
  - name: pathway_recommend
    description: "Recommend evidence-based care pathway with branching logic based on patient-specific factors (comorbidities, contraindications, prior treatments)"
    risk_level: medium
  - name: interaction_check
    description: "Check for drug-drug, drug-allergy, drug-condition, and duplicate therapy interactions against First Databank or equivalent knowledge base"
    risk_level: medium
  - name: order_set_suggest
    description: "Suggest appropriate order sets (Epic SmartSets, Zynx order sets) for the clinical scenario with pre-populated patient-specific parameters"
    risk_level: medium
  - name: dosing_calculate
    description: "Calculate weight-based, renal-adjusted, or hepatic-adjusted dosing using patient labs and pharmacy knowledge base"
    risk_level: high
  - name: cds_alert_present
    description: "Present clinical decision support alert to clinician via CDS Hooks (order-select, order-sign) or Epic BPA with severity classification"
    risk_level: medium
  - name: clinician_action_log
    description: "Log clinician response to CDS recommendation (accept, modify, override with reason) for audit trail and alert fatigue monitoring"
    risk_level: low

constraints:
  max_chain_length: 10
  max_tool_calls_per_step: 4
  escalation_threshold: 0.50
  require_human_above_risk: medium
