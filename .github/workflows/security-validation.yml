name: Security Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily security validation
    - cron: '0 0 * * *'

jobs:
  telemetric-keys-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run Telemetric Keys tests
      run: |
        python -m pytest tests/cryptography/ -v --cov=telos_privacy.cryptography

    - name: SPC Calibration check
      run: |
        python -c "from telos.core import spc; spc.validate_control_limits()"

    - name: Run limited penetration test
      run: |
        # Run subset of attacks for CI/CD (full 2000 runs nightly)
        python security/forensics/DETAILED_ANALYSIS/strix_attack_with_fallback.py --quick-test
      env:
        STRIX_TEST_MODE: "CI"
        MAX_ATTACKS: 100

    - name: Check quantum resistance
      run: |
        python -c "from telos_privacy.cryptography.telemetric_keys_quantum import verify_quantum_resistance; verify_quantum_resistance()"

    - name: Generate security report
      if: always()
      run: |
        echo "## Security Validation Report" > security-report.md
        echo "Date: $(date)" >> security-report.md
        echo "Branch: ${{ github.ref }}" >> security-report.md
        echo "Commit: ${{ github.sha }}" >> security-report.md
        python scripts/generate_security_metrics.py >> security-report.md

    - name: Upload security report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security-report.md

  spc-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install numpy scipy matplotlib

    - name: Validate control limits
      run: |
        python -c "
        import json
        from telos.core.spc import SPCValidator

        validator = SPCValidator()
        results = validator.validate_all()

        # Check process capability
        assert results['cpk'] > 1.33, f'Cpk {results[\"cpk\"]} below threshold'

        # Check control limits
        assert results['ucl_valid'], 'Upper control limit invalid'
        assert results['lcl_valid'], 'Lower control limit invalid'

        print('✅ SPC validation passed')
        print(json.dumps(results, indent=2))
        "

    - name: Generate control charts
      run: |
        python scripts/generate_control_charts.py --output charts/

    - name: Upload control charts
      uses: actions/upload-artifact@v3
      with:
        name: control-charts
        path: charts/

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install linting tools
      run: |
        pip install flake8 black mypy

    - name: Run flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Check black formatting
      run: black --check .

    - name: Run mypy
      run: mypy telos/ --ignore-missing-imports